<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interval Trainer</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00d4c8;
            --lime: #8ec800;
            --bg: #0e1512;
            --panel: #131a16;
            --border: rgba(0,212,200,0.15);
            --text: #d4ede8;
            --muted: rgba(212,237,232,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container { max-width: 560px; width: 100%; }

        .header { text-align: center; margin-bottom: 1.4rem; }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.7rem;
            font-weight: 400;
            color: var(--cyan);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            margin-top: 0.3rem;
        }

        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            background: var(--panel);
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        .score-val {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95rem;
            color: var(--lime);
        }

        .settings {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.1rem;
            margin-bottom: 1rem;
            background: var(--panel);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.7rem;
        }

        .settings h3 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .select-all-row { display: flex; gap: 0.5rem; }

        .btn-tiny {
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--muted);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.62rem;
            padding: 0.18rem 0.5rem;
            cursor: pointer;
            transition: all 0.12s;
        }

        .btn-tiny:hover {
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .interval-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.2rem;
        }

        .interval-check {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.22rem 0.4rem;
            border-radius: 4px;
            transition: background 0.1s;
        }

        .interval-check:hover { background: rgba(0,212,200,0.05); }

        .interval-check input[type="checkbox"] {
            appearance: none;
            width: 13px; height: 13px;
            border: 1px solid rgba(0,212,200,0.3);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: all 0.1s;
        }

        .interval-check input:checked {
            background: var(--cyan);
            border-color: var(--cyan);
        }

        .interval-check input:checked::after {
            content: '';
            position: absolute;
            left: 2px; top: 0px;
            width: 5px; height: 8px;
            border: 1.5px solid #0e1512;
            border-top: none; border-left: none;
            transform: rotate(45deg);
        }

        .interval-check span {
            color: var(--text);
            font-size: 0.82rem;
        }

        .status-box {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.8rem;
            text-align: center;
            margin-bottom: 1rem;
            min-height: 170px;
            background: var(--panel);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .prompt {
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 0.6rem;
        }

        .reference-note {
            font-family: 'Share Tech Mono', monospace;
            font-size: 3.8rem;
            color: var(--lime);
            line-height: 1;
            margin-bottom: 0.6rem;
        }

        .feedback {
            font-size: 0.88rem;
            min-height: 1.2rem;
            color: var(--muted);
        }

        .feedback.correct { color: var(--lime); }

        .detected-pitch {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 0.3rem;
            opacity: 0.6;
        }

        .pitch-meter {
            margin-top: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.45rem 1rem;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            background: rgba(0,0,0,0.3);
        }

        .pitch-note {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.4rem;
            color: var(--cyan);
            min-width: 3rem;
            transition: color 0.1s;
        }

        .pitch-note.on-pitch { color: var(--lime); }

        .pitch-cents {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
        }

        .controls { display: grid; gap: 0.55rem; }

        .btn {
            padding: 0.85rem 1.5rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: all 0.13s;
            border-radius: 8px;
            border: none;
            background: none;
        }

        .btn:disabled { opacity: 0.25; cursor: not-allowed; }

        .btn-primary {
            background: var(--cyan);
            color: #0e1512;
            font-weight: 700;
        }

        .btn-primary:hover:not(:disabled) { background: #00e8da; }

        .btn-secondary {
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            border-color: var(--cyan);
            color: var(--cyan);
            background: rgba(0,212,200,0.05);
        }

        .btn-mic {
            color: var(--lime);
            border: 1px solid rgba(142,200,0,0.25);
        }

        .btn-mic:hover:not(:disabled) {
            border-color: var(--lime);
            background: rgba(142,200,0,0.06);
        }

        .btn-mic.active {
            border-color: var(--lime);
            background: rgba(142,200,0,0.08);
            animation: micPulse 1.8s ease-in-out infinite;
        }

        @keyframes micPulse {
            0%, 100% { box-shadow: none; }
            50% { box-shadow: 0 0 10px rgba(142,200,0,0.2); }
        }

        .success-flash { animation: successFlash 0.5s ease-out; }

        @keyframes successFlash {
            0% { border-color: var(--lime); }
            100% { border-color: var(--border); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Interval Trainer</h1>
            <p class="subtitle">Sing the interval — mic detects your pitch</p>
        </div>

        <div class="score-bar">
            <span>SESSION SCORE</span>
            <span class="score-val" id="scoreVal">— / —</span>
        </div>

        <div class="settings">
            <div class="settings-header">
                <h3>Intervals</h3>
                <div class="select-all-row">
                    <button class="btn-tiny" onclick="setAll(true)">ALL</button>
                    <button class="btn-tiny" onclick="setAll(false)">NONE</button>
                </div>
            </div>
            <div class="interval-grid">
                <label class="interval-check"><input type="checkbox" value="m2" checked><span>Minor 2nd</span></label>
                <label class="interval-check"><input type="checkbox" value="M2" checked><span>Major 2nd</span></label>
                <label class="interval-check"><input type="checkbox" value="m3" checked><span>Minor 3rd</span></label>
                <label class="interval-check"><input type="checkbox" value="M3" checked><span>Major 3rd</span></label>
                <label class="interval-check"><input type="checkbox" value="P4" checked><span>Perfect 4th</span></label>
                <label class="interval-check"><input type="checkbox" value="TT" checked><span>Tritone</span></label>
                <label class="interval-check"><input type="checkbox" value="P5" checked><span>Perfect 5th</span></label>
                <label class="interval-check"><input type="checkbox" value="m6" checked><span>Minor 6th</span></label>
                <label class="interval-check"><input type="checkbox" value="M6" checked><span>Major 6th</span></label>
                <label class="interval-check"><input type="checkbox" value="m7" checked><span>Minor 7th</span></label>
                <label class="interval-check"><input type="checkbox" value="M7" checked><span>Major 7th</span></label>
                <label class="interval-check"><input type="checkbox" value="P8" checked><span>Octave</span></label>
                <label class="interval-check"><input type="checkbox" value="m9" checked><span>Minor 9th</span></label>
            </div>
        </div>

        <div class="status-box" id="statusBox">
            <div class="prompt" id="prompt">Click Start to begin</div>
            <div class="reference-note" id="referenceNote"></div>
            <div class="feedback" id="feedback"></div>
            <div class="detected-pitch" id="detectedPitch"></div>
            <div class="pitch-meter" id="pitchMeter">
                <span class="pitch-note" id="pitchNote">—</span>
                <span class="pitch-cents" id="pitchCents"></span>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">Start Exercise</button>
            <button class="btn btn-mic" id="micBtn" disabled>🎤 Enable Microphone</button>
            <button class="btn btn-secondary" id="playRefBtn" disabled>↻ Play Reference Note</button>
            <button class="btn btn-secondary" id="nextBtn" disabled>Reveal Answer</button>
        </div>
    </div>

    <script>
        let audioContext, micStream, analyser, pitchLoop;
        let currentExercise = null;
        let isListening = false;
        let holdFrames = 0;
        const HOLD_NEEDED = 8;
        let correctCount = 0, totalCount = 0;

        const startBtn = document.getElementById('startBtn');
        const playRefBtn = document.getElementById('playRefBtn');
        const nextBtn = document.getElementById('nextBtn');
        const micBtn = document.getElementById('micBtn');
        const promptEl = document.getElementById('prompt');
        const referenceNote = document.getElementById('referenceNote');
        const feedbackEl = document.getElementById('feedback');
        const detectedPitch = document.getElementById('detectedPitch');
        const pitchMeter = document.getElementById('pitchMeter');
        const pitchNoteEl = document.getElementById('pitchNote');
        const pitchCentsEl = document.getElementById('pitchCents');
        const scoreVal = document.getElementById('scoreVal');
        const statusBox = document.getElementById('statusBox');

        const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

        const intervals = {
            'm2': { semitones: 1,  name: 'Minor 2nd' },
            'M2': { semitones: 2,  name: 'Major 2nd' },
            'm3': { semitones: 3,  name: 'Minor 3rd' },
            'M3': { semitones: 4,  name: 'Major 3rd' },
            'P4': { semitones: 5,  name: 'Perfect 4th' },
            'TT': { semitones: 6,  name: 'Tritone' },
            'P5': { semitones: 7,  name: 'Perfect 5th' },
            'm6': { semitones: 8,  name: 'Minor 6th' },
            'M6': { semitones: 9,  name: 'Major 6th' },
            'm7': { semitones: 10, name: 'Minor 7th' },
            'M7': { semitones: 11, name: 'Major 7th' },
            'P8': { semitones: 12, name: 'Octave' },
            'm9': { semitones: 13, name: 'Minor 9th' }
        };

        function getSelected() {
            return Array.from(document.querySelectorAll('.interval-check input:checked')).map(c => c.value);
        }

        function setAll(s) {
            document.querySelectorAll('.interval-check input').forEach(c => c.checked = s);
        }

        function noteToFreq(s) {
            return 440 * Math.pow(2, -4.75) * Math.pow(2, s / 12);
        }

        function freqToNote(f) {
            const sf = 12 * Math.log2(f / (440 * Math.pow(2, -4.75)));
            const s = Math.round(sf);
            return {
                note: noteNames[((s % 12) + 12) % 12],
                octave: Math.floor(s / 12),
                semitone: s,
                cents: Math.round((sf - s) * 100)
            };
        }

        function playNote(freq, dur = 1.0) {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.frequency.value = freq;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + dur);
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            osc.stop(audioContext.currentTime + dur);
        }

        function detectPitch(buf, sr) {
            const SIZE = buf.length, HALF = Math.floor(SIZE / 2);
            let rms = 0;
            for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
            if (Math.sqrt(rms / SIZE) < 0.01) return null;
            let best = -1, bestC = 0, last = 1, found = false;
            for (let o = 0; o < HALF; o++) {
                let c = 0;
                for (let i = 0; i < HALF; i++) c += Math.abs(buf[i] - buf[i + o]);
                c = 1 - c / HALF;
                if (c > 0.9 && c > last) { found = true; if (c > bestC) { bestC = c; best = o; } }
                else if (found) break;
                last = c;
            }
            return best === -1 ? null : sr / best;
        }

        async function startMic() {
            try {
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const src = audioContext.createMediaStreamSource(micStream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                src.connect(analyser);
                isListening = true;
                holdFrames = 0;
                micBtn.textContent = '🎤 Mic Active — Click to Stop';
                micBtn.classList.add('active');
                pitchMeter.style.display = 'flex';

                const buf = new Float32Array(analyser.fftSize);
                function loop() {
                    if (!isListening) return;
                    analyser.getFloatTimeDomainData(buf);
                    const freq = detectPitch(buf, audioContext.sampleRate);
                    if (freq && freq > 60 && freq < 1200) {
                        const d = freqToNote(freq);
                        pitchNoteEl.textContent = `${d.note}${d.octave}`;
                        pitchCentsEl.textContent = `${d.cents >= 0 ? '+' : ''}${d.cents}¢`;
                        if (currentExercise && !currentExercise.revealed) {
                            const target = noteNames[((currentExercise.targetSemitone % 12) + 12) % 12];
                            if (d.note === target && Math.abs(d.cents) <= 25) {
                                holdFrames++;
                                pitchNoteEl.classList.add('on-pitch');
                                if (holdFrames >= HOLD_NEEDED) handleCorrect();
                            } else {
                                holdFrames = 0;
                                pitchNoteEl.classList.remove('on-pitch');
                            }
                        }
                    } else {
                        pitchNoteEl.textContent = '—';
                        pitchCentsEl.textContent = '';
                        pitchNoteEl.classList.remove('on-pitch');
                        holdFrames = 0;
                    }
                    pitchLoop = requestAnimationFrame(loop);
                }
                loop();
            } catch(e) { alert('Microphone access denied.'); }
        }

        function stopMic() {
            isListening = false;
            if (pitchLoop) cancelAnimationFrame(pitchLoop);
            if (micStream) micStream.getTracks().forEach(t => t.stop());
            micStream = null; analyser = null;
            micBtn.textContent = '🎤 Enable Microphone';
            micBtn.classList.remove('active');
            pitchMeter.style.display = 'none';
            pitchNoteEl.classList.remove('on-pitch');
        }

        function handleCorrect() {
            holdFrames = 0;
            currentExercise.revealed = true;
            correctCount++; totalCount++;
            scoreVal.textContent = `${correctCount} / ${totalCount}`;
            feedbackEl.textContent = `✓ correct — ${currentExercise.targetNote}`;
            feedbackEl.className = 'feedback correct';
            detectedPitch.textContent = `${currentExercise.interval.name} above ${currentExercise.rootNote}`;
            statusBox.classList.add('success-flash');
            setTimeout(() => statusBox.classList.remove('success-flash'), 600);
            playNote(currentExercise.targetFreq, 0.7);
            nextBtn.textContent = 'Next Interval';
        }

        function generateExercise() {
            const sel = getSelected();
            if (!sel.length) { alert('Select at least one interval.'); return null; }
            const type = sel[Math.floor(Math.random() * sel.length)];
            const iv = intervals[type];
            const root = 48 + Math.floor(Math.random() * 12);
            const target = root + iv.semitones;
            const rn = freqToNote(noteToFreq(root));
            const tn = freqToNote(noteToFreq(target));
            return {
                interval: iv, rootFreq: noteToFreq(root), targetFreq: noteToFreq(target),
                rootNote: `${rn.note}${rn.octave}`, targetNote: `${tn.note}${tn.octave}`,
                targetSemitone: target, revealed: false
            };
        }

        function startExercise() {
            currentExercise = generateExercise();
            if (!currentExercise) return;
            holdFrames = 0;
            pitchNoteEl.classList.remove('on-pitch');
            promptEl.textContent = `Sing a ${currentExercise.interval.name} above:`;
            referenceNote.textContent = currentExercise.rootNote;
            feedbackEl.textContent = isListening ? 'Sing the target pitch into your mic' : 'Sing the interval, then reveal';
            feedbackEl.className = 'feedback';
            detectedPitch.textContent = '';
            playNote(currentExercise.rootFreq);
            playRefBtn.disabled = false;
            nextBtn.textContent = 'Reveal Answer';
            nextBtn.disabled = false;
        }

        function revealAnswer() {
            if (!currentExercise || currentExercise.revealed) return;
            currentExercise.revealed = true;
            totalCount++;
            scoreVal.textContent = `${correctCount} / ${totalCount}`;
            feedbackEl.textContent = `answer: ${currentExercise.targetNote}`;
            feedbackEl.className = 'feedback correct';
            detectedPitch.textContent = `${currentExercise.interval.name} above ${currentExercise.rootNote}`;
            playNote(currentExercise.targetFreq);
            nextBtn.textContent = 'Next Interval';
        }

        startBtn.addEventListener('click', () => {
            startBtn.textContent = 'New Exercise';
            micBtn.disabled = false;
            startExercise();
        });
        micBtn.addEventListener('click', () => isListening ? stopMic() : startMic());
        playRefBtn.addEventListener('click', () => currentExercise && playNote(currentExercise.rootFreq));
        nextBtn.addEventListener('click', () => {
            if (!currentExercise) return;
            if (!currentExercise.revealed) revealAnswer();
            else startExercise();
        });
    </script>
</body>
</html>
